<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Offline</title>
        <style>
            body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #282c34;
                color: #ffffff;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                font-size: calc(10px + 2vmin);
            }
            .card {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                padding: 0 24px;
                max-width: 440px;
            }
            h1 {
                margin: 0;
                font-size: 2rem;
                font-weight: 700;
            }
            p {
                margin: 0;
                color: #d8e0f7;
                line-height: 1.4;
            }
            a.retry {
                color: #61dafb;
                font-weight: 600;
                text-decoration: none;
                transition: color 0.2s ease;
            }
            a.retry:hover {
                color: #9ae3fb;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>You're Offline</h1>
            <p>Please check your connection and try again.</p>
            <a class="retry" href="catalyst://retry">Try Again</a>
        </div>
    </body>
</html>
