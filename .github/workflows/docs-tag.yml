name: Tag Docs

on:
    push:
        branches:
            - main
        paths:
            - "docs/**"

permissions:
    contents: write

concurrency:
    group: docs-tag-${{ github.ref_name }}
    cancel-in-progress: false

jobs:
    tag-docs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: "20"

            - name: Build docs
              run: |
                  npm --prefix docs ci
                  cp docs/config_template.json docs/config.json
                  npm run docs:build

            - name: Create docs git tag
              run: |
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git config --global user.name "github-actions[bot]"

                  git fetch --tags origin

                  LATEST_TAG=$(git tag --list "catalyst-docs-v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)

                  if [ -z "$LATEST_TAG" ]; then
                    TAG_NAME="catalyst-docs-v1.0.0"
                  else
                    VERSION="${LATEST_TAG#catalyst-docs-v}"
                    MAJOR="${VERSION%%.*}"
                    REMAINDER="${VERSION#*.}"
                    MINOR="${REMAINDER%%.*}"
                    PATCH="${VERSION##*.}"
                    NEXT_PATCH=$((PATCH + 1))
                    TAG_NAME="catalyst-docs-v${MAJOR}.${MINOR}.${NEXT_PATCH}"
                  fi

                  git tag "$TAG_NAME"
                  git push origin "$TAG_NAME"
