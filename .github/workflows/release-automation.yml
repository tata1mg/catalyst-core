name: Release Automation

on:
    workflow_dispatch:
        inputs:
            version:
                description: "catalyst-core version"
                required: true
                type: string
            npm_tag:
                description: "npm dist-tag"
                required: true
                type: choice
                options:
                    - beta
                    - latest
                    - canary
            pr_number:
                description: "PR number used for release notes"
                required: true
                type: string
            commit_sha:
                description: "Commit SHA, optional"
                required: false
                type: string
                default: ""
    workflow_call:
        inputs:
            version:
                required: true
                type: string
            npm_tag:
                required: true
                type: string
            pr_number:
                required: false
                type: string
                default: ""
            commit_sha:
                required: false
                type: string
                default: ""

permissions:
    contents: read
    id-token: write
    pull-requests: read

jobs:
    trigger:
        runs-on: ubuntu-latest
        steps:
            - name: Trigger release automation service
              env:
                  VERSION: ${{ inputs.version }}
                  NPM_TAG: ${{ inputs.npm_tag }}
                  PR_NUMBER_INPUT: ${{ inputs.pr_number }}
                  COMMIT_SHA_INPUT: ${{ inputs.commit_sha }}
                  RELEASE_AUTOMATION_URL: https://stagcatalyst.1mg.com/release-automation/release-requests
                  GH_TOKEN: ${{ github.token }}
              run: |
                  COMMIT_SHA="$COMMIT_SHA_INPUT"
                  if [ -z "$COMMIT_SHA" ]; then
                    COMMIT_SHA="$GITHUB_SHA"
                  fi

                  PR_NUMBER="$PR_NUMBER_INPUT"
                  if [ -z "$PR_NUMBER" ]; then
                    PR_NUMBER=$(gh api \
                      -H "Accept: application/vnd.github+json" \
                      "repos/${GITHUB_REPOSITORY}/commits/${COMMIT_SHA}/pulls" \
                      --jq '.[0].number // ""' 2>/dev/null || true)
                  fi

                  if [ -z "$PR_NUMBER" ]; then
                    echo "::error::Could not resolve pull request number. Provide pr_number when running this workflow manually."
                    exit 1
                  fi

                  OIDC_RESPONSE=$(curl --fail-with-body -sS \
                    -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                    "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=catalyst-release-automation")
                  OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')

                  if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" == "null" ]; then
                    echo "::error::Could not fetch GitHub OIDC token"
                    exit 1
                  fi

                  PAYLOAD=$(jq -n \
                    --arg repo "$GITHUB_REPOSITORY" \
                    --arg packageName "catalyst-core" \
                    --arg version "$VERSION" \
                    --arg npmTag "$NPM_TAG" \
                    --arg prNumber "$PR_NUMBER" \
                    --arg commitSha "$COMMIT_SHA" \
                    --arg tagName "catalyst-core@$VERSION" \
                    '{
                      repo: $repo,
                      packageName: $packageName,
                      version: $version,
                      npmTag: $npmTag,
                      prNumber: $prNumber,
                      commitSha: $commitSha,
                      tagName: $tagName
                    }')

                  curl --fail-with-body -X POST "$RELEASE_AUTOMATION_URL" \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer $OIDC_TOKEN" \
                    -d "$PAYLOAD"
